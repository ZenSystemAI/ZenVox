<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <rect width="800" height="120" rx="16" fill="#0F0F0F"/>
  
  <!-- Step 1: Speak -->
  <rect x="20" y="25" width="140" height="70" rx="10" fill="#191919" stroke="#4ECDB8" stroke-width="2"/>
  <text x="90" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e4e4e7">&#x1F399;</text>
  <text x="90" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4ECDB8">You speak</text>

  <!-- Arrow 1 -->
  <text x="185" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#4ECDB8">&#x2192;</text>

  <!-- Step 2: Whisper -->
  <rect x="210" y="25" width="160" height="70" rx="10" fill="#191919" stroke="#27272a" stroke-width="1"/>
  <text x="290" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#e4e4e7">Whisper (local)</text>
  <text x="290" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">Never leaves your PC</text>
  <text x="290" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4ECDB8">&#x1F512; Private</text>

  <!-- Arrow 2 -->
  <text x="395" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#4ECDB8">&#x2192;</text>

  <!-- Step 3: LLM Clean -->
  <rect x="420" y="25" width="160" height="70" rx="10" fill="#191919" stroke="#27272a" stroke-width="1"/>
  <text x="500" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#e4e4e7">AI cleans it</text>
  <text x="500" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#71717a">Your key, your model</text>
  <text x="500" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ff9800">5 providers</text>

  <!-- Arrow 3 -->
  <text x="605" y="65" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#4ECDB8">&#x2192;</text>

  <!-- Step 4: Paste -->
  <rect x="630" y="25" width="150" height="70" rx="10" fill="#191919" stroke="#4ECDB8" stroke-width="2"/>
  <text x="705" y="55" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#e4e4e7">&#x2328;</text>
  <text x="705" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4ECDB8">Auto-pasted</text>
</svg>
